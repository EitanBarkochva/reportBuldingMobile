<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>מערכת ניהול ופיקוח הנדסי</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f0f2f5; margin: 0; padding: 10px; color: #333; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .tabs { display: flex; border-bottom: 2px solid #ddd; margin-bottom: 20px; overflow-x: auto; white-space: nowrap; -webkit-overflow-scrolling: touch; padding-bottom: 5px; scrollbar-width: none; }
        .tabs::-webkit-scrollbar { display: none; }
        .tab-btn { background: none; border: none; padding: 12px 20px; cursor: pointer; font-size: 16px; font-weight: bold; color: #666; transition: 0.3s; flex: 0 0 auto; border-radius: 8px 8px 0 0; }
        .tab-btn:hover { background-color: #f8f9fa; color: #008000; }
        .tab-btn.active { border-bottom: 4px solid #008000; color: #008000; background-color: #f4fff4; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .full-width { grid-column: 1 / -1; }
        label { display: block; font-weight: bold; margin-bottom: 8px; font-size: 14px; color: #444; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ced4da; border-radius: 8px; box-sizing: border-box; font-family: inherit; font-size: 16px; background-color: #fff; transition: border-color 0.2s; }
        input:focus, select:focus, textarea:focus { border-color: #008000; outline: none; box-shadow: 0 0 0 3px rgba(0,128,0,0.1); }
        input[readonly] { background-color: #e9ecef; color: #666; cursor: not-allowed; }
        textarea { resize: vertical; min-height: 100px; }
        
        .section-title { margin-top: 30px; margin-bottom: 15px; border-bottom: 2px solid #008000; padding-bottom: 8px; color: #008000; font-size: 18px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; font-weight: bold;}
        .search-box { border: 2px solid #008000; border-radius: 8px; padding: 12px 15px; font-size: 16px; margin-bottom: 20px; width: 100%; box-sizing: border-box; padding-left: 40px; }
        
        .radio-group { display: flex; gap: 15px; flex-wrap: wrap; }
        .radio-group label { margin: 0; cursor: pointer; display: flex; align-items: center; gap: 10px; background: #fff; border: 1px solid #ced4da; padding: 12px 20px; border-radius: 8px; flex: 1; justify-content: center; font-size: 15px; transition: 0.2s; }
        .radio-group input[type="radio"] { width: 20px; height: 20px; margin: 0; accent-color: #008000; }
        .radio-group label:has(input:checked) { border-color: #008000; background-color: #f4fff4; color: #008000; font-weight: bold; }

        button { cursor: pointer; border-radius: 8px; border: none; font-family: inherit; transition: 0.2s; }
        .action-btn { color: white; padding: 16px; font-size: 18px; width: 100%; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0, 0.1); }
        .action-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 12px rgba(0,0,0, 0.15); }
        .add-btn { background-color: #008000; color: white; padding: 10px 15px; font-size: 14px; font-weight: bold; }
        .remove-btn { background-color: #dc3545; color: white; padding: 12px; margin-right: 10px; min-width: 45px; font-weight: bold; border-radius: 8px;}
        .refresh-btn { background-color: #17a2b8; color: white; padding: 8px 12px; font-size: 13px; border-radius: 6px; float: left; margin-bottom: 10px; }
        
        .dynamic-row { display: flex; align-items: center; margin-bottom: 12px; background: #f8f9fa; padding: 12px; border-radius: 8px; border: 1px solid #e9ecef; gap: 10px; flex-wrap: wrap;}
        .dynamic-row input { flex: 1; min-width: 120px; margin: 0 !important; }

        .image-block { border: 2px dashed #008000; padding: 20px; border-radius: 12px; margin-bottom: 15px; background: #f8fbfc; position: relative; text-align: center; }
        .image-block .remove-img-btn { position: absolute; top: 10px; left: 10px; background: #dc3545; color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 13px; z-index: 10;}
        
        .canvas-toolbar { background: #343a40; padding: 12px; border-radius: 8px; margin-top: 15px; margin-bottom: 10px; color: white; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; justify-content: center; }
        .canvas-toolbar button { padding: 10px 14px; font-size: 16px; flex: 0 1 auto; }
        .canvas-toolbar button.active { background-color: #008000; box-shadow: inset 0 2px 4px rgba(0,0,0,0.2); }
        
        .canvas-wrapper { position: relative; display: inline-block; max-width: 100%; border: 2px solid #008000; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); background: #fff;}
        .canvas-wrapper img.bg-img { display: block; max-width: 100%; height: auto; pointer-events: none; }
        .canvas-wrapper canvas.draw-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .canvas-wrapper canvas.draft-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; cursor: crosshair; touch-action: none; }
        
        .inline-text-input { position: absolute; background: rgba(255, 255, 255, 0.5); border: 2px dashed #008000; font-family: Arial; font-weight: bold; outline: none; z-index: 100; direction: rtl; padding: 2px 5px; border-radius: 4px; min-width: 20px; display: inline-block; white-space: nowrap; }
        .inline-text-input:empty:before { content: 'טקסט...'; color: #999; }

        #signatureCanvas { border: 2px dashed #999; background: #fffdf2; max-width: 100%; width: 400px; height: 200px; margin: 0 auto; cursor: crosshair; touch-action: none; border-radius: 12px; box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);}

        table { width: 100%; border-collapse: collapse; margin-top: 10px; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.05); clear: both; }
        th, td { border-bottom: 1px solid #eee; padding: 15px 12px; text-align: right; }
        th { background-color: #008000; color: white; font-weight: bold; }
        tr:hover { background-color: #f1f8ff; cursor: pointer;}
        
        #loadingMsg { background: #008000; color: white; font-weight: bold; text-align: center; display: none; margin-top: 15px; padding: 15px; border-radius: 8px; font-size: 16px; box-shadow: 0 4px 12px rgba(0,128,0,0.3); position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 1000; width: 90%; max-width: 400px; animation: slideUp 0.3s; }
        @keyframes slideUp { from { bottom: -50px; opacity: 0; } to { bottom: 20px; opacity: 1; } }

        .switch { position: relative; display: inline-block; width: 60px; height: 34px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 26px; width: 26px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #dc3545; }
        input:checked + .slider:before { transform: translateX(26px); }

        @media (max-width: 768px) {
            body { padding: 5px; }
            .container { padding: 15px; border-radius: 8px; }
            .form-grid { grid-template-columns: 1fr; gap: 10px; }
            .dynamic-row { flex-direction: column; align-items: stretch; background: transparent; padding: 0; border: none; border-bottom: 2px dashed #ddd; padding-bottom: 15px; border-radius: 0; }
            .remove-btn { width: 100%; margin-right: 0; margin-top: 5px; }
            .radio-group { flex-direction: column; }
            
            table, thead, tbody, th, td, tr { display: block; }
            thead tr { position: absolute; top: -9999px; left: -9999px; } 
            tr { margin-bottom: 15px; border: 1px solid #ddd; border-radius: 10px; background: #fff; box-shadow: 0 2px 6px rgba(0,0,0,0.06); padding: 5px 0; }
            td { border: none; border-bottom: 1px solid #f1f1f1; position: relative; padding: 12px 15px 12px 45%; text-align: left; font-size: 15px; min-height: 25px; }
            td:last-child { border-bottom: 0; text-align: right; }
            td:before { position: absolute; right: 15px; top: 12px; width: 45%; white-space: nowrap; font-weight: bold; color: #555; text-align: right; content: attr(data-label); }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="tabs">
        <button class="tab-btn active" id="btnTabNewReport" onclick="switchTab('reportTab', this)">יצירת דוח פיקוח</button>
        <button class="tab-btn" id="btnTabAllProjects" onclick="switchTab('listTab', this)">פרויקטים</button>
        <button class="tab-btn" id="btnTabReportsList" onclick="switchTab('reportListTab', this)">דוחות</button>
        <button class="tab-btn" id="btnTabProject" onclick="switchTab('formTab', this)" style="display:none;">ניהול פרויקט</button>
    </div>

    <div id="reportTab" class="tab-content active">
        <div class="form-grid">
            <div><label>מספר דוח</label><input type="text" id="repId" readonly></div>
            <div><label>תאריך הבדיקה</label><input type="date" id="repDate"></div>
            
            <div class="full-width section-title">כללי</div>
            
            <div class="full-width">
                <label>בחר פרויקט</label>
                <div style="display:flex; gap:10px; align-items:center;">
                    <select id="repProjectIndex" style="flex:1;"><option value="">טוען פרויקטים...</option></select>
                    <button type="button" class="add-btn" style="white-space:nowrap;" onclick="initNewProject()">+ צור פרויקט חדש</button>
                </div>
            </div>
            
            <div class="full-width">
                <label>סוג הבדיקה:</label>
                <div class="radio-group">
                    <label><input type="radio" name="inspectionType" value="בדיקה פיזית" checked> <span>בדיקה פיזית</span></label>
                    <label><input type="radio" name="inspectionType" value="בדיקת וידאו"> <span>בדיקת וידאו</span></label>
                </div>
            </div>

            <div><label>שם האלמנט הנבדק</label><input type="text" id="repElement" placeholder="למשל: יציקת תקרה קומה 1"></div>
            <div><label>שם הבודק</label><input type="text" id="repInspector" placeholder="שם המהנדס הבודק"></div>

            <div class="full-width section-title">נוכחים <button class="add-btn" onclick="addDynamicField('attendeesContainer', 'שם הנוכח')">+ הוסף אדם</button></div>
            <div id="attendeesContainer" class="full-width"></div>

            <div class="full-width section-title">תיאור הבדיקה <button class="add-btn" onclick="addDynamicField('descriptionsContainer', 'פרטי הבדיקה')">+ הוסף תיאור</button></div>
            <div id="descriptionsContainer" class="full-width"></div>

            <div class="full-width section-title">הערות <button class="add-btn" onclick="addDynamicField('remarksContainer', 'הערה לתיקון')">+ הוסף הערה</button></div>
            <div id="remarksContainer" class="full-width"></div>

            <div class="full-width section-title">סיכום הדוח</div>
            <div class="full-width"><textarea id="repSummary" placeholder="כתוב כאן את סיכום הבדיקה הכללי והנחיות להמשך..."></textarea></div>

            <div class="full-width section-title">תיעוד ותמונות מהשטח <button class="add-btn" onclick="addImageBlock()">+ הוסף תמונה</button></div>
            
            <div id="existingPdfContainer" class="full-width" style="display:none; text-align:center; background: #fff3cd; padding: 15px; border-radius: 8px; border: 1px solid #ffeeba;"></div>
            <div id="imagesContainer" class="full-width"></div>

            <div class="full-width section-title">חתימת הבודק</div>
            <div class="full-width" style="text-align: center;">
                <canvas id="signatureCanvas" width="400" height="200"></canvas><br>
                <button class="add-btn" style="background:#6c757d; margin-top: 10px;" onclick="clearSignature()">מחק חתימה ונסה שוב</button>
            </div>
            
            <div class="full-width section-title">פעולות סיום</div>
            <div class="full-width" style="display: flex; gap: 15px; flex-wrap: wrap;">
                <button class="action-btn" style="background-color: #17a2b8; margin-top: 0; flex: 1;" onclick="saveReport(false, true)">👁️ צור וצפה ב-PDF</button>
                <button class="action-btn" style="background-color: #28a745; margin-top: 0; flex: 1;" onclick="saveReport(true, false)">✉️ שמור ושלח במייל</button>
            </div>
        </div>
    </div>

    <div id="listTab" class="tab-content">
        <button class="refresh-btn" onclick="fetchProjectsData(true)">🔄 רענן נתונים</button>
        <button class="add-btn" style="float:left; margin-bottom:10px;" onclick="initNewProject()">+ פרויקט חדש</button>
        
        <div style="clear:both; margin-bottom:15px;">
            <label style="cursor:pointer; display:inline-flex; align-items:center; gap:8px;">
                <input type="checkbox" id="showClosedProjects" onchange="fetchProjectsData(true)" style="width:18px; height:18px;">
                הצג גם פרויקטים סגורים מהעבר
            </label>
        </div>

        <input type="text" id="projectSearch" class="search-box" placeholder="חפש לפי פרויקט, מקום או יזם..." onkeyup="filterTable('projectSearch', 'projectsTable')">
        <table id="projectsTable">
            <thead><tr><th>שם פרויקט</th><th>מקום פרויקט</th><th>שם יזם</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>

    <div id="formTab" class="tab-content">
        <div class="form-grid">
            <div><label>מספר פרויקט</label><input type="text" id="projId" readonly></div>
            <div><label>תאריך יצירה</label><input type="date" id="projDate" readonly></div>
            
            <div class="full-width section-title">פרטי הפרויקט</div>
            <div><label>שם הפרויקט</label><input type="text" id="projName" placeholder="הכנס שם פרויקט..."></div>
            <div><label>מקום פרויקט</label><input type="text" id="projLocation" placeholder="כתובת או עיר..."></div>
            <div><label>יזם</label><input type="text" id="projEntrepreneur" placeholder="שם היזם..."></div>
            <div><label>מהנדס ביצוע</label><input type="text" id="projEngineer" placeholder="שם המהנדס..."></div>
            <div><label>קונסטרוקטור</label><input type="text" id="projConstructor" value="מהנדס חננאל כפיר"></div>
            
            <div style="display:flex; flex-direction:column; justify-content:center; align-items:flex-start; padding:10px; background:#fff3cd; border-radius:8px;">
                <label style="margin-bottom:5px; color:#856404;">סטטוס פרויקט:</label>
                <div style="display:flex; align-items:center; gap:10px;">
                    <span style="font-weight:bold;">בטיפול</span>
                    <label class="switch"><input type="checkbox" id="projIsClosed"><span class="slider"></span></label>
                    <span style="font-weight:bold; color:#dc3545;">סגור</span>
                </div>
            </div>
            
            <div class="full-width section-title">צוות הפרויקט (לתפוצת מייל) <button class="add-btn" onclick="addWorkerRow()">+ הוסף עובד</button></div>
        </div>
        <div id="workersContainer"></div>
        <button class="action-btn" style="background-color: #008000; margin-top: 25px;" id="submitProjBtn" onclick="saveProject()">שמור פרויקט 💾</button>
    </div>

    <div id="reportListTab" class="tab-content">
        <div style="background: #e9ecef; padding: 15px; border-radius: 8px; margin-bottom: 20px;">
            <label style="font-size: 16px; color: #008000;">בחר פרויקט להצגת הדוחות שלו:</label>
            <select id="filterReportsProject" onchange="fetchProjectReports(this.value)" style="border: 2px solid #008000;">
                <option value="">-- בחר פרויקט מהרשימה --</option>
            </select>
        </div>

        <button class="add-btn" style="margin-bottom:15px; width:100%; padding:15px; font-size:16px;" onclick="switchTab('reportTab', document.getElementById('btnTabNewReport')); initNewReport();">+ יצירת דוח חדש</button>
        <input type="text" id="reportSearch" class="search-box" placeholder="חפש לפי מספר דוח או שם אלמנט..." onkeyup="filterTable('reportSearch', 'reportsTable')">
        
        <table id="reportsTable">
            <thead><tr><th>מספר דוח</th><th>שם הבודק</th><th>האלמנט הנבדק</th><th>מסמך PDF</th></tr></thead>
            <tbody><tr><td colspan="4" style="text-align:center;">בחר פרויקט כדי לראות דוחות...</td></tr></tbody>
        </table>
    </div>

    <div id="loadingMsg">מעבד נתונים ושומר... אנא המתן ⏳</div>
</div>

<script>
    // =========================================================================
    // ↓↓↓ מדביקים את הלינק של השרת שלך כאן למטה (מסתיים ב-exec) ↓↓↓
    // =========================================================================
    const scriptURL = 'https://script.google.com/macros/s/AKfycbx0g0YSSE3ykDgQhCAR2piA-2vvOe3qecZnMQqI1VguOGXkjIdROSSCzUSBi1dGY4-A/exec'; 
    // =========================================================================

    let allProjects = [];
    let currentProjectReports = []; 

    window.onload = () => { 
        initNewReport();
        fetchProjectsData(true); 
        setupSignatureCanvas(); 
    };

    function switchTab(tabId, btnElement) {
        document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        if(btnElement) btnElement.classList.add('active');
        window.scrollTo(0, 0); 
    }

    function filterTable(inputId, tableId) {
        const input = document.getElementById(inputId);
        const filter = input.value.toLowerCase();
        const table = document.getElementById(tableId);
        const tr = table.getElementsByTagName('tr');
        for (let i = 1; i < tr.length; i++) {
            let rowText = tr[i].textContent.toLowerCase();
            tr[i].style.display = rowText.includes(filter) ? "" : "none";
        }
    }

    let isSigned = false;
    function setupSignatureCanvas() {
        const sigCanvas = document.getElementById('signatureCanvas');
        const sigCtx = sigCanvas.getContext('2d');
        let isSigning = false;

        function getSigPos(e) {
            const rect = sigCanvas.getBoundingClientRect(); const scaleX = sigCanvas.width / rect.width; const scaleY = sigCanvas.height / rect.height;
            let clientX = e.clientX, clientY = e.clientY; if (e.touches && e.touches.length > 0) { clientX = e.touches[0].clientX; clientY = e.touches[0].clientY; }
            return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY };
        }

        function startSig(e) { isSigning = true; isSigned = true; const pos = getSigPos(e); sigCtx.beginPath(); sigCtx.moveTo(pos.x, pos.y); if(e.cancelable) e.preventDefault(); }
        function drawSig(e) { if(!isSigning) return; const pos = getSigPos(e); sigCtx.strokeStyle = "#000080"; sigCtx.lineWidth = 3; sigCtx.lineCap = 'round'; sigCtx.lineTo(pos.x, pos.y); sigCtx.stroke(); if(e.cancelable) e.preventDefault(); }
        function stopSig() { isSigning = false; }

        sigCanvas.addEventListener('mousedown', startSig); sigCanvas.addEventListener('mousemove', drawSig);
        sigCanvas.addEventListener('mouseup', stopSig); sigCanvas.addEventListener('mouseout', stopSig);
        sigCanvas.addEventListener('touchstart', startSig, { passive: false }); sigCanvas.addEventListener('touchmove', drawSig, { passive: false });
        sigCanvas.addEventListener('touchend', stopSig);
    }

    function clearSignature() {
        const sigCanvas = document.getElementById('signatureCanvas');
        sigCanvas.getContext('2d').clearRect(0, 0, sigCanvas.width, sigCanvas.height);
        isSigned = false;
    }

    async function fetchProjectsData(showLoading = false) {
        const showAll = document.getElementById('showClosedProjects').checked;
        const pTbody = document.querySelector('#projectsTable tbody');
        if(showLoading) pTbody.innerHTML = '<tr><td colspan="3" style="text-align:center;">טוען פרויקטים...⏳</td></tr>'; 
        
        try {
            const res = await fetch(scriptURL, { method: 'POST', body: JSON.stringify({ action: 'get_active_projects', showAll: showAll }), headers: { 'Content-Type': 'text/plain;charset=utf-8' } });
            const data = JSON.parse(await res.text());
            allProjects = data.projects || [];
            
            const selectReport = document.getElementById('repProjectIndex');
            const selectFilter = document.getElementById('filterReportsProject');
            
            selectReport.innerHTML = '<option value="">-- בחר פרויקט --</option>';
            selectFilter.innerHTML = '<option value="">-- בחר פרויקט מהרשימה --</option>';
            
            allProjects.forEach((p, idx) => {
                if (!p.isClosed) { selectReport.innerHTML += `<option value="${idx}">${p.name}</option>`; }
                selectFilter.innerHTML += `<option value="${idx}">${p.name} ${p.isClosed ? '(סגור)' : ''}</option>`;
            });
            
            pTbody.innerHTML = '';
            if(allProjects.length === 0) pTbody.innerHTML = '<tr><td colspan="3" style="text-align:center;">אין פרויקטים להצגה.</td></tr>';
            
            allProjects.forEach((p, idx) => {
                const tr = document.createElement('tr');
                tr.onclick = () => loadProjectForEdit(idx); 
                tr.innerHTML = `
                    <td data-label="שם פרויקט"><strong>${p.name}</strong> ${p.isClosed ? '<span style="color:#dc3545; font-size:12px;">(סגור)</span>' : ''}</td>
                    <td data-label="מקום פרויקט">${p.location}</td>
                    <td data-label="שם יזם">${p.entrepreneur}</td>
                `;
                pTbody.appendChild(tr);
            });
        } catch(e) { console.error(e); alert("שגיאה בטעינת נתונים."); }
    }

    function initNewProject() {
        document.querySelectorAll('#formTab input').forEach(inp => { if(inp.type !== 'checkbox') inp.value = ''; });
        document.getElementById('projIsClosed').checked = false; 
        document.getElementById('projConstructor').value = "מהנדס חננאל כפיר"; 
        document.getElementById('projId').value = "PRJ-" + Date.now();
        document.getElementById('projDate').valueAsDate = new Date();
        document.getElementById('workersContainer').innerHTML = '';
        addWorkerRow();
        document.getElementById('submitProjBtn').innerText = "שמור פרויקט 💾";
        
        const tabBtn = document.getElementById('btnTabProject');
        tabBtn.style.display = 'inline-block';
        switchTab('formTab', tabBtn);
    }

    function loadProjectForEdit(index) {
        const p = allProjects[index];
        document.getElementById('projId').value = p.id;
        if(p.date) document.getElementById('projDate').valueAsDate = new Date(p.date);
        document.getElementById('projName').value = p.name || '';
        document.getElementById('projLocation').value = p.location || '';
        document.getElementById('projEntrepreneur').value = p.entrepreneur || '';
        document.getElementById('projEngineer').value = p.engineer || '';
        document.getElementById('projConstructor').value = p.constructorName || "מהנדס חננאל כפיר";
        document.getElementById('projIsClosed').checked = p.isClosed;

        document.getElementById('workersContainer').innerHTML = '';
        if (p.workers && p.workers.length > 0) p.workers.forEach(w => addWorkerRow(w.name, w.role, w.email)); else addWorkerRow();

        const tabBtn = document.getElementById('btnTabProject');

    function addWorkerRow(name='', role='', email='') {
        const div = document.createElement('div'); div.className = 'dynamic-row';
        div.innerHTML = `<input type="text" class="w-name" placeholder="שם העובד" value="${name}"> <input type="text" class="w-role" placeholder="תפקיד" value="${role}"> <input type="email" class="w-email" placeholder="אימייל" value="${email}"> <button class="remove-btn" onclick="this.parentElement.remove()">X</button>`;
        document.getElementById('workersContainer').appendChild(div);
    }

    async function saveProject() {
        const name = document.getElementById('projName').value;
        if(!name) return alert("חובה למלא שם פרויקט!");
        const workers = [];
        document.querySelectorAll('#workersContainer .dynamic-row').forEach(row => { workers.push({ name: row.querySelector('.w-name').value, role: row.querySelector('.w-role').value, email: row.querySelector('.w-email').value }); });
        
        const isClosed = document.getElementById('projIsClosed').checked;

        const payload = { 
            action: 'save_project', id: document.getElementById('projId').value, date: document.getElementById('projDate').value, 
            name: name, location: document.getElementById('projLocation').value, entrepreneur: document.getElementById('projEntrepreneur').value, 
            engineer: document.getElementById('projEngineer').value, constructorName: document.getElementById('projConstructor').value, 
            workers: workers, isClosed: isClosed 
        };
        await sendData(payload);
        
        await fetchProjectsData(false);
        switchTab('listTab', document.getElementById('btnTabAllProjects'));
    }

    async function fetchProjectReports(projectIndex) {
        const rTbody = document.querySelector('#reportsTable tbody');
        if (projectIndex === "") {
            rTbody.innerHTML = '<tr><td colspan="4" style="text-align:center;">בחר פרויקט כדי לראות דוחות...</td></tr>';
            currentProjectReports = [];
            return;
        }

        const project = allProjects[projectIndex];
        rTbody.innerHTML = '<tr><td colspan="4" style="text-align:center;">טוען דוחות לפרויקט...⏳</td></tr>';
        
        try {
            const res = await fetch(scriptURL, { method: 'POST', body: JSON.stringify({ action: 'get_reports_for_project', projectName: project.name }), headers: { 'Content-Type': 'text/plain;charset=utf-8' } });
            const data = JSON.parse(await res.text());
            
            if(data.status !== "success") throw new Error(data.message);
            currentProjectReports = data.reports || [];
            
            rTbody.innerHTML = '';
            if(currentProjectReports.length === 0) rTbody.innerHTML = '<tr><td colspan="4" style="text-align:center;">אין דוחות לפרויקט זה</td></tr>';
            
            currentProjectReports.forEach((r, idx) => {
                const tr = document.createElement('tr');
                tr.onclick = (e) => { if(e.target.tagName !== 'A') loadReportForEdit(idx, projectIndex); };
                tr.innerHTML = `<td data-label="מספר דוח">${r.id}</td><td data-label="שם הבודק">${r.inspector}</td><td data-label="האלמנט הנבדק"><strong>${r.element}</strong></td><td data-label="מסמך PDF"><a href="${r.pdfLink}" target="_blank" style="color:#008000; background:#f4fff4; padding:6px 12px; border-radius:20px; display:inline-block; text-decoration:none; font-size:14px; border:1px solid #c3e6cb;">📄 צפה ב-PDF</a></td>`;
                rTbody.appendChild(tr);
            });
        } catch (e) {
            rTbody.innerHTML = `<tr><td colspan="4" style="text-align:center; color:red;">${e.message}</td></tr>`;
        }
    }

    function initNewReport() {
        document.getElementById('repId').value = "REP-" + Date.now();
        document.getElementById('repDate').valueAsDate = new Date();
        document.getElementById('repProjectIndex').value = ""; 
        document.getElementById('repElement').value = "";
        document.getElementById('repInspector').value = "";
        document.getElementById('repSummary').value = "";
        
        document.getElementById('attendeesContainer').innerHTML = '';
        document.getElementById('descriptionsContainer').innerHTML = '';
        document.getElementById('remarksContainer').innerHTML = '';
        
        addDynamicField('attendeesContainer', 'שם הנוכח');
        addDynamicField('descriptionsContainer', 'פרטי הבדיקה');
        addDynamicField('remarksContainer', 'הערה לתיקון');
        
        document.getElementById('imagesContainer').innerHTML = ''; 
        document.getElementById('existingPdfContainer').style.display = 'none';
        
        clearSignature();
        document.getElementsByName('inspectionType')[0].checked = true; 
        
        document.getElementById('btnTabNewReport').innerText = "יצירת דוח פיקוח";

    function loadReportForEdit(reportIndex, projectIndex) {
        const r = currentProjectReports[reportIndex];
        
        document.getElementById('repId').value = r.id;
        if(r.date) document.getElementById('repDate').valueAsDate = new Date(r.date);
        
        const selectReport = document.getElementById('repProjectIndex');
        let optionExists = Array.from(selectReport.options).some(opt => opt.value == projectIndex);
        if (!optionExists) {
            selectReport.innerHTML += `<option value="${projectIndex}">${allProjects[projectIndex].name} (סגור)</option>`;
        }
        document.getElementById('repProjectIndex').value = projectIndex;

        document.getElementById('repElement').value = r.element;
        document.getElementById('repInspector').value = r.inspector;
        document.getElementById('repSummary').value = r.summary;
        document.getElementsByName('inspectionType').forEach(radio => { if(radio.value === r.inspectionType) radio.checked = true; });

        document.getElementById('attendeesContainer').innerHTML = '';
        document.getElementById('descriptionsContainer').innerHTML = '';
        document.getElementById('remarksContainer').innerHTML = '';
        
        try {
            const att = JSON.parse(r.attendees); if(att && att.length > 0) att.forEach(val => restoreDynamicField('attendeesContainer', val, 'שם הנוכח')); else addDynamicField('attendeesContainer', 'שם הנוכח');
            const des = JSON.parse(r.descriptions); if(des && des.length > 0) des.forEach(val => restoreDynamicField('descriptionsContainer', val, 'פרטי הבדיקה')); else addDynamicField('descriptionsContainer', 'פרטי הבדיקה');
            const rem = JSON.parse(r.remarks); if(rem && rem.length > 0) rem.forEach(val => restoreDynamicField('remarksContainer', val, 'הערה לתיקון')); else addDynamicField('remarksContainer', 'הערה לתיקון');
        } catch(e) {}

        document.getElementById('imagesContainer').innerHTML = ''; 
        const pdfContainer = document.getElementById('existingPdfContainer');
        pdfContainer.style.display = 'block';
        pdfContainer.innerHTML = `<p style="color:#666; font-weight:bold;">הדוח מכיל תמונות וחתימה קודמים ב-PDF.</p><a href="${r.pdfLink}" target="_blank" style="margin-bottom:10px;">📄 פתח את המסמך הקיים</a>`;

        clearSignature();
        
        document.getElementById('btnTabNewReport').innerText = "עריכת דוח קיים";
        switchTab('reportTab', document.getElementById('btnTabNewReport'));
    }

    function addDynamicField(containerId, placeholder) {
        const div = document.createElement('div'); div.className = 'dynamic-row';
        div.innerHTML = `<input type="text" class="dyn-val" placeholder="${placeholder}"> <button class="remove-btn" onclick="this.parentElement.remove()">X</button>`;
        document.getElementById(containerId).appendChild(div);
    }
    function restoreDynamicField(containerId, value, placeholder) {
        const div = document.createElement('div'); div.className = 'dynamic-row';
        div.innerHTML = `<input type="text" class="dyn-val" placeholder="${placeholder}" value="${value}"> <button class="remove-btn" onclick="this.parentElement.remove()">X</button>`;
        document.getElementById(containerId).appendChild(div);
    }
    function collectDynamic(containerId) {
        return Array.from(document.querySelectorAll(`#${containerId} .dyn-val`)).map(inp => inp.value.trim()).filter(v => v);
    }

    let imageCounter = 0;
    function addImageBlock() {
        imageCounter++;
        const blockId = 'imgBlock_' + imageCounter;
        const div = document.createElement('div'); div.className = 'image-block'; div.id = blockId;
        div.innerHTML = `
            <button class="remove-img-btn" onclick="document.getElementById('${blockId}').remove()">הסר בלוק</button>
            <div class="upload-options" style="margin-top:40px; display:flex; gap:15px; justify-content:center; flex-wrap:wrap;">
                <label class="add-btn" style="background:#28a745; cursor:pointer; flex:1; padding:15px; font-size:18px;">📸 צלם בשטח<input type="file" accept="image/*" capture="environment" onchange="loadImageToCanvas(this, '${blockId}')" style="display:none;"></label>
                <label class="add-btn" style="background:#17a2b8; cursor:pointer; flex:1; padding:15px; font-size:18px;">🖼️ בחר מגלריה<input type="file" accept="image/*" onchange="loadImageToCanvas(this, '${blockId}')" style="display:none;"></label>
            </div>
            <div class="canvas-area" style="display:none;">
                <div class="canvas-toolbar">
                    <input type="color" class="color-picker" value="#ff0000" style="width:45px; height:45px; padding:0; border:none; cursor:pointer; border-radius:5px;">
                    <input type="range" class="line-width" min="1" max="15" value="4" style="width:90px; cursor:pointer;">
                    <button class="add-btn mode-draw active" onclick="setCanvasTool('${blockId}', 'draw', this)">✎ חופשי</button>
                    <button class="add-btn mode-rect" onclick="setCanvasTool('${blockId}', 'rect', this)">🟥 מלבן</button>
                    <button class="add-btn mode-circle" onclick="setCanvasTool('${blockId}', 'circle', this)">⭕ עיגול</button>
                    <button class="add-btn mode-line" onclick="setCanvasTool('${blockId}', 'line', this)">📏 קו</button>
                    <button class="add-btn mode-text" onclick="setCanvasTool('${blockId}', 'text', this)">T טקסט</button>
                    <button class="add-btn mode-eraser" onclick="setCanvasTool('${blockId}', 'eraser', this)" style="background:#6c757d;">🧽 מחק</button>
                    <button class="add-btn" style="background:#dc3545;" onclick="undoCanvas('${blockId}')">↶ נקה הכל</button>
                </div>
                <div class="canvas-wrapper"><img class="bg-img" /><canvas class="draw-canvas"></canvas><canvas class="draft-canvas"></canvas></div>
            </div>
        `;
        document.getElementById('imagesContainer').appendChild(div); div.dataset.tool = 'draw'; 
    }

    function loadImageToCanvas(inputElem, blockId) {
        const file = inputElem.files[0]; if(!file) return;
        const block = document.getElementById(blockId);
        const imgElem = block.querySelector('.bg-img'); const drawCanvas = block.querySelector('.draw-canvas'); const draftCanvas = block.querySelector('.draft-canvas');
        const reader = new FileReader();
        reader.onload = function(e) {
            const img = new Image();
            img.onload = () => {
                imgElem.src = img.src; drawCanvas.width = draftCanvas.width = img.naturalWidth; drawCanvas.height = draftCanvas.height = img.naturalHeight;
                block.querySelector('.upload-options').style.display = 'none'; block.querySelector('.canvas-area').style.display = 'block';
                setupEngineeringCanvasEvents(block);
            };
            img.src = e.target.result;
        }
        reader.readAsDataURL(file);
    }

    function setCanvasTool(blockId, tool, btnElement) { const block = document.getElementById(blockId); block.dataset.tool = tool; block.querySelectorAll('.canvas-toolbar .add-btn').forEach(btn => btn.classList.remove('active')); btnElement.classList.add('active'); }
    function undoCanvas(blockId) { if(!confirm("האם למחוק הכל מהתמונה?")) return; const block = document.getElementById(blockId); block.querySelector('.draw-canvas').getContext('2d').clearRect(0, 0, block.querySelector('.draw-canvas').width, block.querySelector('.draw-canvas').height); block.querySelectorAll('.inline-text-input').forEach(inp => inp.remove()); }
    function commitText(input, block) { if(!input.parentElement) return; const txt = (input.innerText || "").trim(); if(txt) { const ctx = block.querySelector('.draw-canvas').getContext('2d'); ctx.fillStyle = input.style.color; ctx.font = `bold ${input.dataset.canvasFont}px Arial`; ctx.textBaseline = 'top'; ctx.fillText(txt, parseFloat(input.dataset.logicalX), parseFloat(input.dataset.logicalY)); } input.remove();  }

    function setupEngineeringCanvasEvents(block) {
        const drawCanvas = block.querySelector('.draw-canvas'); const draftCanvas = block.querySelector('.draft-canvas');
        const drawCtx = drawCanvas.getContext('2d'); const draftCtx = draftCanvas.getContext('2d'); const wrapper = block.querySelector('.canvas-wrapper');
        let isDrawing = false, startX = 0, startY = 0;

        function getPointerPos(e) {
            const rect = draftCanvas.getBoundingClientRect(); const scaleX = draftCanvas.width / rect.width; const scaleY = draftCanvas.height / rect.height;
            let clientX = e.clientX, clientY = e.clientY; if (e.touches && e.touches.length > 0) { clientX = e.touches[0].clientX; clientY = e.touches[0].clientY; }
            return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY, clientX: clientX, clientY: clientY };
        }

        function startDraw(e) {
            const tool = block.dataset.tool; const pos = getPointerPos(e);
            if(tool === 'text') {
                const openInput = block.querySelector('.inline-text-input'); if (openInput) { commitText(openInput, block); return; }
                const wrapperRect = wrapper.getBoundingClientRect(); const cssX = pos.clientX - wrapperRect.left; const cssY = pos.clientY - wrapperRect.top;
                const input = document.createElement('div'); input.className = 'inline-text-input'; input.contentEditable = 'true';
                const canvasFont = parseInt(block.querySelector('.line-width').value) * 10;
                input.style.left = cssX + 'px'; input.style.top = cssY + 'px'; input.style.color = block.querySelector('.color-picker').value; input.style.fontSize = (canvasFont * (wrapperRect.width / drawCanvas.width)) + 'px';
                input.dataset.logicalX = pos.x; input.dataset.logicalY = pos.y; input.dataset.canvasFont = canvasFont;
                wrapper.appendChild(input); setTimeout(() => input.focus(), 50);
                const finishText = () => commitText(input, block); input.addEventListener('blur', finishText); input.addEventListener('keydown', (evt) => { if (evt.key === 'Enter') { evt.preventDefault(); finishText(); } }); 
                if(e.cancelable) e.preventDefault(); return; 
            }
            const openInput = block.querySelector('.inline-text-input'); if(openInput) commitText(openInput, block);
            isDrawing = true; startX = pos.x; startY = pos.y; const width = parseInt(block.querySelector('.line-width').value);
            if (tool === 'eraser') { drawCtx.globalCompositeOperation = 'destination-out'; drawCtx.lineWidth = width * 4; drawCtx.lineCap = 'round'; drawCtx.lineJoin = 'round'; drawCtx.beginPath(); drawCtx.moveTo(startX, startY); }
            else { draftCtx.globalCompositeOperation = 'source-over'; draftCtx.strokeStyle = block.querySelector('.color-picker').value; draftCtx.lineWidth = width; draftCtx.lineCap = 'round'; draftCtx.lineJoin = 'round'; if (tool === 'draw') { draftCtx.beginPath(); draftCtx.moveTo(startX, startY); } }
            if(e.cancelable) e.preventDefault();
        }

        function doDraw(e) {
            if(!isDrawing || block.dataset.tool === 'text') return; const pos = getPointerPos(e); const tool = block.dataset.tool;
            if (tool === 'eraser') { drawCtx.lineTo(pos.x, pos.y); drawCtx.stroke(); }
            else if (tool === 'draw') { draftCtx.lineTo(pos.x, pos.y); draftCtx.stroke(); }
            else { draftCtx.clearRect(0, 0, draftCanvas.width, draftCanvas.height); draftCtx.beginPath(); 
                if(tool === 'rect') draftCtx.rect(startX, startY, pos.x - startX, pos.y - startY); else if(tool === 'circle') draftCtx.arc(startX, startY, Math.sqrt(Math.pow(pos.x - startX, 2) + Math.pow(pos.y - startY, 2)), 0, 2 * Math.PI); else if(tool === 'line') { draftCtx.moveTo(startX, startY); draftCtx.lineTo(pos.x, pos.y); } draftCtx.stroke(); 
            } if(e.cancelable) e.preventDefault();
        }

        function stopDraw() { if (isDrawing && block.dataset.tool !== 'eraser') { drawCtx.globalCompositeOperation = 'source-over'; drawCtx.drawImage(draftCanvas, 0, 0); draftCtx.clearRect(0, 0, draftCanvas.width, draftCanvas.height); } isDrawing = false; }
        draftCanvas.addEventListener('mousedown', startDraw); draftCanvas.addEventListener('mousemove', doDraw); draftCanvas.addEventListener('mouseup', stopDraw); draftCanvas.addEventListener('mouseout', stopDraw);
        draftCanvas.addEventListener('touchstart', startDraw, { passive: false }); draftCanvas.addEventListener('touchmove', doDraw, { passive: false }); draftCanvas.addEventListener('touchend', stopDraw);
    }

    async function saveReport(isSendEmail, isOpenPdf) {
        document.querySelectorAll('.image-block').forEach(block => { const openInput = block.querySelector('.inline-text-input'); if(openInput) commitText(openInput, block); });
        
        const projIndex = document.getElementById('repProjectIndex').value;
        if(projIndex === "") return alert("חובה לבחור פרויקט מהרשימה!");
        
        const projectData = allProjects[projIndex];

        let selectedInspectionType = '';
        document.getElementsByName('inspectionType').forEach(r => { if(r.checked) selectedInspectionType = r.value; });

        let emails = [];
        if(projectData && projectData.workers) emails = projectData.workers.map(w => w.email);

        const imagesB64 = [];
        document.querySelectorAll('.image-block').forEach(block => {
            const bgImg = block.querySelector('.bg-img'); const drawCanvas = block.querySelector('.draw-canvas');
            if(drawCanvas.width > 0 && bgImg.src) {
                const tempCanvas = document.createElement('canvas'); tempCanvas.width = drawCanvas.width; tempCanvas.height = drawCanvas.height; const tempCtx = tempCanvas.getContext('2d');
                tempCtx.drawImage(bgImg, 0, 0, tempCanvas.width, tempCanvas.height); tempCtx.drawImage(drawCanvas, 0, 0);
                imagesB64.push(tempCanvas.toDataURL("image/png").split(',')[1]);
            }
        });

        const sigCanvas = document.getElementById('signatureCanvas');
        
        const payload = {
            action: 'save_report', 
            reportId: document.getElementById('repId').value, date: document.getElementById('repDate').value,
            inspectionType: selectedInspectionType, projectName: projectData.name, element: document.getElementById('repElement').value,
            inspector: document.getElementById('repInspector').value, attendees: collectDynamic('attendeesContainer'), remarks: collectDynamic('remarksContainer'), descriptions: collectDynamic('descriptionsContainer'), summary: document.getElementById('repSummary').value,
            images: imagesB64, signature: isSigned ? sigCanvas.toDataURL("image/png").split(',')[1] : null, 
            sendEmail: isSendEmail, distributionList: emails 
        };

        const result = await sendData(payload);
        if(result && result.status === 'success') {
            if (isOpenPdf) {
                window.open(result.pdfLink, '_blank');
                alert("הדוח נוצר ונשמר בהצלחה! ה-PDF נפתח כעת.");
            } else if (isSendEmail) {
                alert("הדוח נוצר, נשמר, ונשלח במייל לצוות הפרויקט בהצלחה!");
            }

            document.getElementById('filterReportsProject').value = projIndex;
            fetchProjectReports(projIndex);
            switchTab('reportListTab', document.getElementById('btnTabReportsList'));
        }
    }

    async function sendData(payload) {
        document.getElementById('loadingMsg').style.display = 'block';
        try {
            const response = await fetch(scriptURL, { method: 'POST', body: JSON.stringify(payload), headers: { 'Content-Type': 'text/plain;charset=utf-8' } });
            const result = JSON.parse(await response.text());
            if(result.status !== 'success') alert("שגיאה מהשרת: " + result.message);
            return result;
        } catch (error) { alert("שגיאת תקשורת: " + error.message); return null; } 
        finally { document.getElementById('loadingMsg').style.display = 'none'; }
    }
